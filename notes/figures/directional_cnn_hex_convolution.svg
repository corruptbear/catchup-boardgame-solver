<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900" role="img" aria-labelledby="title desc">
  <title id="title">Directional CNN over the Catchup hex board</title>
  <desc id="desc">Code-aligned diagram showing the 9 by 9 axial storage mask, the six directional hex-neighbor gathers, and the HexDirectionalBlock update.</desc>

  <defs>
    <style>
      .bg { fill: #f7fafc; }
      .panel { fill: #ffffff; stroke: #cbd5e1; stroke-width: 1.6; }
      .panel-soft { fill: #f8fbff; stroke: #cbd5e1; stroke-width: 1.4; }
      .title { font: 700 31px Arial, sans-serif; fill: #0f172a; }
      .subtitle { font: 15px Arial, sans-serif; fill: #475569; }
      .section { font: 700 20px Arial, sans-serif; fill: #0f172a; }
      .label { font: 700 15px Arial, sans-serif; fill: #18324a; }
      .body { font: 14px Arial, sans-serif; fill: #475569; }
      .small { font: 12px Arial, sans-serif; fill: #64748b; }
      .tiny { font: 11px Arial, sans-serif; fill: #64748b; }
      .code { font: 13px Menlo, Consolas, monospace; fill: #1f2937; }
      .code-strong { font: 700 13px Menlo, Consolas, monospace; fill: #0f172a; }
      .target-code { font: 11px Menlo, Consolas, monospace; fill: #ffffff; }
      .slot-base { fill: #e7edf3; stroke: #bcc9d6; stroke-width: 1; }
      .slot-valid { fill: #d9f4ec; }
      .slot-neighbor { fill: #ffe3a3; stroke: #b87500; stroke-width: 1.8; }
      .slot-target { fill: #2463eb; stroke: #123aa6; stroke-width: 2; }
      .slot-grid { stroke: #ffffff; stroke-width: 1.4; }
      .axis { font: 11px Menlo, Consolas, monospace; fill: #64748b; }
      .hex-valid { fill: #e8fff5; stroke: #118a68; stroke-width: 2; }
      .hex-target { fill: #2563eb; stroke: #123aa6; stroke-width: 2.4; }
      .hex-neighbor { fill: #ffd166; stroke: #a46100; stroke-width: 2; }
      .hex-muted { fill: #f1f5f9; stroke: #cbd5e1; stroke-width: 1.4; }
      .box-blue { fill: #eff6ff; stroke: #2563eb; stroke-width: 1.8; }
      .box-amber { fill: #fff7e6; stroke: #d97706; stroke-width: 1.8; }
      .box-green { fill: #effdf6; stroke: #059669; stroke-width: 1.8; }
      .box-red { fill: #fff1f2; stroke: #e11d48; stroke-width: 1.8; }
      .box-gray { fill: #f8fafc; stroke: #94a3b8; stroke-width: 1.4; }
      .arrow { fill: none; stroke: #475569; stroke-width: 2.1; marker-end: url(#arrow); }
      .arrow-blue { fill: none; stroke: #2563eb; stroke-width: 2.1; marker-end: url(#arrowBlue); }
      .arrow-amber { fill: none; stroke: #b87500; stroke-width: 2.2; marker-end: url(#arrowAmber); }
      .arrow-green { fill: none; stroke: #059669; stroke-width: 2.1; marker-end: url(#arrowGreen); }
      .dash { stroke-dasharray: 5 4; }
    </style>

    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#475569"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
    <marker id="arrowAmber" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b87500"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#059669"/>
    </marker>

    <g id="pointy-hex">
      <polygon points="0,-31 26.85,-15.5 26.85,15.5 0,31 -26.85,15.5 -26.85,-15.5"/>
    </g>
  </defs>

  <rect width="1400" height="900" class="bg"/>

  <text x="48" y="54" class="title">Directional CNN over the Catchup hex board</text>
  <text x="48" y="82" class="subtitle">The model uses a fixed 9 x 9 tensor for axial coordinates, but each block gathers along the six real hex directions.</text>
  <text x="48" y="106" class="subtitle">Reference: HexDirectionalCnnPolicyValueNet and HexDirectionalBlock in catchup/training/torch_policy_value.py.</text>

  <rect x="40" y="135" width="410" height="430" rx="10" class="panel"/>
  <text x="66" y="170" class="section">1. Axial storage mask</text>
  <text x="66" y="198" class="body">row = r + 4, column = q + 4</text>
  <text x="66" y="220" class="body">81 tensor slots; 61 valid board cells; 20 masked slots.</text>

  <g transform="translate(93 256)">
    <rect x="0" y="0" width="270" height="270" rx="4" class="slot-base"/>
    <rect x="120" y="0" width="150" height="30" class="slot-valid"/>
    <rect x="90" y="30" width="180" height="30" class="slot-valid"/>
    <rect x="60" y="60" width="210" height="30" class="slot-valid"/>
    <rect x="30" y="90" width="240" height="30" class="slot-valid"/>
    <rect x="0" y="120" width="270" height="30" class="slot-valid"/>
    <rect x="0" y="150" width="240" height="30" class="slot-valid"/>
    <rect x="0" y="180" width="210" height="30" class="slot-valid"/>
    <rect x="0" y="210" width="180" height="30" class="slot-valid"/>
    <rect x="0" y="240" width="150" height="30" class="slot-valid"/>

    <rect x="150" y="120" width="30" height="30" class="slot-neighbor"/>
    <rect x="90" y="120" width="30" height="30" class="slot-neighbor"/>
    <rect x="120" y="150" width="30" height="30" class="slot-neighbor"/>
    <rect x="120" y="90" width="30" height="30" class="slot-neighbor"/>
    <rect x="150" y="90" width="30" height="30" class="slot-neighbor"/>
    <rect x="90" y="150" width="30" height="30" class="slot-neighbor"/>
    <rect x="120" y="120" width="30" height="30" class="slot-target"/>

    <path d="M 30 0 V 270 M 60 0 V 270 M 90 0 V 270 M 120 0 V 270 M 150 0 V 270 M 180 0 V 270 M 210 0 V 270 M 240 0 V 270" class="slot-grid"/>
    <path d="M 0 30 H 270 M 0 60 H 270 M 0 90 H 270 M 0 120 H 270 M 0 150 H 270 M 0 180 H 270 M 0 210 H 270 M 0 240 H 270" class="slot-grid"/>
    <rect x="0" y="0" width="270" height="270" rx="4" fill="none" stroke="#94a3b8" stroke-width="1.2"/>

    <text x="-29" y="18" class="axis">r=-4</text>
    <text x="-29" y="138" class="axis">r=0</text>
    <text x="-29" y="258" class="axis">r=4</text>
    <text x="4" y="-10" class="axis">q=-4</text>
    <text x="125" y="-10" class="axis">q=0</text>
    <text x="245" y="-10" class="axis">q=4</text>
    <text x="127" y="139" class="target-code">(0,0)</text>
  </g>

  <g transform="translate(66 532)">
    <rect x="0" y="0" width="17" height="17" class="slot-base"/>
    <text x="25" y="13" class="small">masked padding</text>
    <rect x="138" y="0" width="17" height="17" class="slot-valid"/>
    <text x="163" y="13" class="small">valid cell</text>
    <rect x="251" y="0" width="17" height="17" class="slot-neighbor"/>
    <text x="276" y="13" class="small">gathered source</text>
  </g>

  <rect x="490" y="135" width="410" height="430" rx="10" class="panel"/>
  <text x="516" y="170" class="section">2. Six directional gathers</text>
  <text x="516" y="198" class="body">For each target slot, _direction_matrices reads these</text>
  <text x="516" y="220" class="body">source neighbors in code order, then concatenates them.</text>

  <g transform="translate(692 356)">
    <use href="#pointy-hex" class="hex-neighbor" transform="translate(55.4 0)"/>
    <use href="#pointy-hex" class="hex-neighbor" transform="translate(-55.4 0)"/>
    <use href="#pointy-hex" class="hex-neighbor" transform="translate(27.7 48)"/>
    <use href="#pointy-hex" class="hex-neighbor" transform="translate(-27.7 -48)"/>
    <use href="#pointy-hex" class="hex-neighbor" transform="translate(27.7 -48)"/>
    <use href="#pointy-hex" class="hex-neighbor" transform="translate(-27.7 48)"/>
    <use href="#pointy-hex" class="hex-target" transform="translate(0 0)"/>

    <path d="M 41 0 H 18" class="arrow-amber"/>
    <path d="M -41 0 H -18" class="arrow-amber"/>
    <path d="M 20.5 35.5 L 9.5 16" class="arrow-amber"/>
    <path d="M -20.5 -35.5 L -9.5 -16" class="arrow-amber"/>
    <path d="M 20.5 -35.5 L 9.5 -16" class="arrow-amber"/>
    <path d="M -20.5 35.5 L -9.5 16" class="arrow-amber"/>

    <text x="-14" y="5" class="target-code">(q,r)</text>
    <text x="40" y="-39" class="code-strong">D4</text>
    <text x="73" y="5" class="code-strong">D0</text>
    <text x="39" y="64" class="code-strong">D2</text>
    <text x="-82" y="5" class="code-strong">D1</text>
    <text x="-87" y="-58" class="code-strong">D3</text>
    <text x="-88" y="66" class="code-strong">D5</text>
  </g>

  <g transform="translate(525 473)">
    <rect x="0" y="0" width="330" height="66" rx="8" class="box-amber"/>
    <text x="17" y="24" class="code-strong">D0..D5 = (1,0), (-1,0), (0,1),</text>
    <text x="17" y="46" class="code-strong">          (0,-1), (1,-1), (-1,1)</text>
  </g>

  <rect x="940" y="135" width="420" height="430" rx="10" class="panel"/>
  <text x="966" y="170" class="section">3. HexDirectionalBlock</text>
  <text x="966" y="198" class="body">The learned PyTorch convolutions are 1x1.</text>
  <text x="966" y="220" class="body">The hex geometry comes from the fixed gather matrices.</text>

  <g transform="translate(970 255)">
    <rect x="0" y="0" width="150" height="64" rx="8" class="box-blue"/>
    <text x="18" y="26" class="label">hidden</text>
    <text x="18" y="48" class="code">H x 9 x 9</text>

    <rect x="238" y="-44" width="150" height="64" rx="8" class="box-blue"/>
    <text x="256" y="-18" class="label">self_linear</text>
    <text x="256" y="4" class="code">1x1: H -> H</text>

    <rect x="238" y="80" width="150" height="72" rx="8" class="box-amber"/>
    <text x="256" y="107" class="label">neighbor_linear</text>
    <text x="256" y="129" class="code">1x1: 6H -> H</text>

    <rect x="0" y="88" width="150" height="64" rx="8" class="box-amber"/>
    <text x="18" y="114" class="label">six gathers</text>
    <text x="18" y="136" class="code">6H x 9 x 9</text>

    <rect x="87" y="214" width="220" height="72" rx="8" class="box-green"/>
    <text x="108" y="242" class="label">residual block output</text>
    <text x="108" y="264" class="code">valid_mask * (hidden + update)</text>

    <path d="M 150 32 C 182 32 196 -7 232 -11" class="arrow-blue"/>
    <path d="M 150 120 H 232" class="arrow-amber"/>
    <path d="M 313 20 C 313 70 258 173 218 209" class="arrow-blue"/>
    <path d="M 313 152 C 313 184 284 200 248 216" class="arrow-amber"/>
    <path d="M 75 64 V 208" class="arrow dash"/>

    <text x="98" y="184" class="code">update = ReLU(self + neighbor)</text>
  </g>

  <rect x="40" y="602" width="1320" height="278" rx="10" class="panel"/>
  <text x="66" y="637" class="section">Full directional-CNN policy/value flow</text>

  <g transform="translate(70 675)">
    <rect x="0" y="0" width="170" height="94" rx="8" class="box-gray"/>
    <text x="17" y="28" class="label">310 features</text>
    <text x="17" y="52" class="code">4 cell flags x 61</text>
    <text x="17" y="72" class="code">+ legal + scalars</text>

    <rect x="230" y="0" width="190" height="94" rx="8" class="box-blue"/>
    <text x="247" y="28" class="label">cell_to_grid</text>
    <text x="247" y="52" class="code">5 cell channels</text>
    <text x="247" y="72" class="code">-> 5 x 9 x 9</text>

    <rect x="480" y="0" width="190" height="94" rx="8" class="box-green"/>
    <text x="497" y="28" class="label">broadcast globals</text>
    <text x="497" y="52" class="code">4 scalars + finish</text>
    <text x="497" y="72" class="code">-> 6 x 9 x 9</text>

    <rect x="730" y="0" width="170" height="94" rx="8" class="box-blue"/>
    <text x="747" y="28" class="label">input_projection</text>
    <text x="747" y="52" class="code">1x1: 10 -> H</text>
    <text x="747" y="72" class="code">mask invalid</text>

    <rect x="960" y="0" width="170" height="94" rx="8" class="box-amber"/>
    <text x="977" y="28" class="label">directional blocks</text>
    <text x="977" y="52" class="code">repeat cnn_layers</text>
    <text x="977" y="72" class="code">default: 4</text>

    <rect x="104" y="132" width="240" height="74" rx="8" class="box-red"/>
    <text x="122" y="158" class="label">claim policy logits</text>
    <text x="122" y="180" class="code">1x1 scorer + index_select</text>
    <text x="122" y="200" class="code">61 valid cells</text>

    <rect x="424" y="132" width="240" height="74" rx="8" class="box-green"/>
    <text x="442" y="158" class="label">FINISH logit</text>
    <text x="442" y="180" class="code">pooled hidden</text>
    <text x="442" y="200" class="code">+ global encoder</text>

    <rect x="744" y="132" width="240" height="74" rx="8" class="box-green"/>
    <text x="762" y="158" class="label">value head</text>
    <text x="762" y="180" class="code">tanh(value_head(combined))</text>

    <path d="M 170 47 H 224" class="arrow"/>
    <path d="M 420 47 H 474" class="arrow"/>
    <path d="M 670 47 H 724" class="arrow"/>
    <path d="M 900 47 H 954" class="arrow"/>
    <path d="M 1045 94 C 1045 122 310 110 248 128" class="arrow"/>
    <path d="M 1045 94 C 1045 126 640 112 561 128" class="arrow"/>
    <path d="M 1045 94 C 1045 130 900 113 862 128" class="arrow"/>

    <rect x="1168" y="10" width="92" height="172" rx="8" class="panel-soft"/>
    <text x="1184" y="40" class="small">Not a square</text>
    <text x="1184" y="58" class="small">3x3 kernel.</text>
    <text x="1184" y="91" class="small">Effective</text>
    <text x="1184" y="109" class="small">board field:</text>
    <text x="1184" y="134" class="code-strong">center</text>
    <text x="1184" y="154" class="code-strong">+ 6 dirs</text>
  </g>
</svg>
